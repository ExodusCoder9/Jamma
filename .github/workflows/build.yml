name: build

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'oracle'
        java-version: '25'

    - name: Build math-core
      run: ./gradlew :math-core:build

    - name: Build math-incubator
      run: ./gradlew :math-incubator:build

    - name: Test math-core
      run: ./gradlew :math-core:test

    - name: Test math-incubator
      run: ./gradlew :math-incubator:test
